name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust stable
        run: rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test
